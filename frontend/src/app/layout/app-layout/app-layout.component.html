<header class="navbar">
  <!-- LEFT -->
  <div class="nav-left">
    <div class="brand">
      <span class="brand-icon">{{ '{' }} {{ '}' }}</span>
      <span class="brand-text">ThinkJava</span>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">
        <svg viewBox="0 0 24 24" class="nav-icon">
          <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" />
        </svg>
        Dashboard
      </a>

      <a routerLink="/learn" routerLinkActive="active">
        <svg viewBox="0 0 24 24" class="nav-icon">
          <path d="M4 5h16v14H4z" />
          <path d="M4 9h16" />
        </svg>
        Learn
      </a>

      <a routerLink="/practice" routerLinkActive="active">
        <svg viewBox="0 0 24 24" class="nav-icon">
          <path d="M12 3v18M3 12h18" />
        </svg>
        Practice
      </a>

      <a routerLink="/progress" routerLinkActive="active">
        <svg viewBox="0 0 24 24" class="nav-icon">
          <path d="M4 20V10M10 20V4M16 20v-7" />
        </svg>
        Progress
      </a>
    </nav>
  </div>

  <!-- RIGHT -->
  <div class="nav-right">
    <button class="quiz-btn" type="button" (click)="goQuiz()">
      Take Quiz
    </button>

    <button class="icon-btn" type="button" title="Notifications coming soon" disabled>
      <svg viewBox="0 0 24 24" class="icon-svg">
        <path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2h16z" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    </button>

    <div class="avatar" [title]="displayName || 'User'">
      {{ initials }}
    </div>

    <button class="logout-btn" type="button" (click)="logout()">
      Logout
    </button>
  </div>
</header>

<main class="content">
  <router-outlet></router-outlet>
</main>
